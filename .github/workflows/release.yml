name: Release Package

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install build tools
      run: pip install build twine
    - name: Build distribution
      run: python -m build
    - name: Verify package
      run: twine check dist/*
